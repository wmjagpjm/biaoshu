  <text x="910" y="568" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· 数据驻留策略</text>
  <text x="910" y="591" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· 备份容灾</text>
  <text x="910" y="614" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· 监控告警</text>

  <text x="910" y="660" fill="#64748b" font-family="Microsoft YaHei, sans-serif" font-size="11">目标用户：公网订阅客户</text>
