  <text x="1020" y="805" text-anchor="middle" fill="#fdba74" font-family="Microsoft YaHei, sans-serif" font-size="12">当前公网就绪度</text>

  <!-- Bottom principle -->
  <rect x="50" y="840" width="1100" height="100" rx="12" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="600" y="875" text-anchor="middle" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="600">原则锁定：Web 自托管优先 · 用户自备 Key · 只参考 C 端交互不抄 AGPL · 人工反馈→AI 定向调整</text>
  <text x="600" y="905" text-anchor="middle" fill="#94a3b8" font-family="Microsoft YaHei, sans-serif" font-size="12">建议节奏：先打磨 NOW→NEXT（向量/导出/查重）→ 再上内网多人，最后考虑公网 SaaS</text>
  <text x="600" y="925" text-anchor="middle" fill="#64748b" font-family="Microsoft YaHei, sans-serif" font-size="11">文件：docs/diagrams/target-roadmap.svg · 数据口径见 docs/HANDOFF-next.md</text>
</svg>
