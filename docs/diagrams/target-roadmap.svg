  <text x="180" y="255" text-anchor="middle" fill="#86efac" font-family="Microsoft YaHei, sans-serif" font-size="12">已实现 · ~技术标90% 商务80%</text>

  <text x="70" y="290" fill="#86efac" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="600">✓ 产品内核</text>
  <text x="70" y="315" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· 技术标六步全链路</text>
  <text x="70" y="338" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· 商务标六步 MVP</text>
  <text x="70" y="361" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· 异步任务 + 取消</text>
  <text x="70" y="384" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· revise 反馈写回</text>
  <text x="70" y="407" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· Word 导出样式</text>
  <text x="70" y="430" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· 知识库关键词 RAG</text>
  <text x="70" y="453" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· 用户自备 LLM Key</text>
  <text x="70" y="476" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· MinerU 回传通道</text>

  <text x="70" y="520" fill="#86efac" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="600">✓ 工程形态</text>
  <text x="70" y="545" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· Web 自托管</text>
  <text x="70" y="568" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· SQLite + 本地文件</text>
  <text x="70" y="591" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· 1s 任务轮询</text>
  <text x="70" y="614" fill="#e2e8f0" font-family="Microsoft YaHei, sans-serif" font-size="12">· 单 workspace</text>
