  <rect width="1200" height="980" fill="url(#bg)"/>
  <text x="600" y="40" text-anchor="middle" fill="#f8fafc" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="26" font-weight="700">biaoshu 产品目标图 / 演进路线</text>
  <text x="600" y="68" text-anchor="middle" fill="#94a3b8" font-family="Microsoft YaHei, sans-serif" font-size="13">从本机写标书 → 内网多人协作 → 公网 SaaS（能力对齐 C 端交互，自研实现）</text>

  <!-- Vision banner -->
  <rect x="80" y="90" width="1040" height="70" rx="12" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="120" text-anchor="middle" fill="#c7d2fe" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="600">目标形态：浏览器 → FastAPI → 任务 Worker → 解析 / RAG / 流水线 / 导出</text>
  <text x="600" y="142" text-anchor="middle" fill="#a5b4fc" font-family="Microsoft YaHei, sans-serif" font-size="12">存储：SQLite→PG · 文件 · Redis · SSE/WebSocket · 一账号一 workspace（可扩多成员）</text>

  <!-- Phase columns -->
  <!-- P0 Now -->
